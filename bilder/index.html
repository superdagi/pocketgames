<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            padding: 20px;
        }
        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <h1>Image Gallery</h1>
    <div class="gallery">
        <img src="IMG_3822.PNG" alt="IMG_3822">
        <img src="IMG_1325.JPG" alt="IMG_1325">
        <img src="IMG_1326.JPG" alt="IMG_1326">
        <img src="IMG_1331.JPG" alt="IMG_1331">
        <img src="IMG_1334.JPG" alt="IMG_1334">
        <img src="IMG_1338.JPG" alt="IMG_1338">
        <img src="IMG_1340.JPG" alt="IMG_1340">

</body>
</html>

<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe Loader</title>
    <style>
        iframe {
            width: 100%;
            height: 500px;
            border: 1px solid #ccc;
        }
        button {
            margin: 5px;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Last inn sider i en iframe</h1>
    <button onclick="loadPage('small_letter.html')">Små bokstaver</button>
    <button onclick="loadPage('tall.html')">Tall</button>

    <iframe id="contentFrame" src="" frameborder="0"></iframe>

    <script>
        function loadPage(page) {
            document.getElementById('contentFrame').src = page;
        }
    </script>

</body>
</html>
